<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu MCU</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
      font-family: 'Segoe UI', sans-serif;
    }

    .menu-card{
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .menu-btn{
      height: 150px;
      border-radius: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .menu-btn i{
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="container py-5">

  <div class="card menu-card p-5">
    <h2 class="text-center mb-4">
      Registrasi MCU
    </h2>

    <div class="row g-4">

      <!-- Identitas -->
      <div class="col-md-6">
        <a href="identitas.html" class="btn btn-primary w-100 menu-btn">
          <i class="bi bi-person-vcard"></i>
          Peserta Baru
        </a>
      </div>

      <!-- Mandiri -->
      <div class="col-md-6">
        <a href="history.html" class="btn btn-success w-100 menu-btn">
          <i class="bi bi-clipboard2-pulse"></i>
          Riwayat Penyakit
        </a>
      </div>

    </div>
  </div>

</div>

</body>
</html>
