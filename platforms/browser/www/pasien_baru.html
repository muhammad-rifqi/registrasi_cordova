<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Registrasi MCU</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef3f9;
      font-family: 'Segoe UI', sans-serif;
      color: #1d1d1d;
      min-height: 100vh;
    }

    /* =========================
       WRAPPER
    ========================== */
    .phone-wrapper {
      width: 100%;
      max-width: 1200px;
      margin: auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* =========================
       HEADER
    ========================== */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: linear-gradient(135deg, #0d6efd, #2563eb);
      color: white;
      padding: 18px 24px;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-back {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 20px;
      transition: 0.3s;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .title-area h5 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .title-area small {
      opacity: 0.9;
      font-size: 13px;
    }

    /* =========================
       CONTENT
    ========================== */
    .content-area {
      flex: 1;
      padding: 30px 20px;
    }

    .card-mobile {
      background: white;
      border-radius: 28px;
      padding: 35px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .section-subtitle {
      color: #6c757d;
      font-size: 14px;
      margin-bottom: 30px;
    }

    /* =========================
       FORM GRID
    ========================== */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .form-item.full {
      grid-column: 1 / -1;
    }

    @media (min-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* =========================
       FORM
    ========================== */
    .form-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #444;
    }

    .input-group {
      margin-bottom: 0;
    }

    .input-group-text {
      background: #f7f9fc;
      border-radius: 16px 0 0 16px;
      border: 1px solid #dee2e6;
      color: #0d6efd;
      min-width: 55px;
      justify-content: center;
    }

    .form-control,
    .form-select,
    textarea {
      border-radius: 0 16px 16px 0 !important;
      min-height: 55px;
      border: 1px solid #dee2e6;
      font-size: 14px;
      padding: 12px;
    }

    textarea.form-control {
      min-height: 120px;
      resize: vertical;
    }

    .form-control:focus,
    .form-select:focus {
      box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
      border-color: #0d6efd;
    }

    /* =========================
       BUTTON
    ========================== */
    .btn-area {
      display: flex;
      gap: 15px;
      margin-top: 35px;
      flex-wrap: wrap;
    }

    .btn-submit,
    .btn-cancel {
      flex: 1;
      min-width: 180px;
      height: 55px;
      padding: 10px;
      border-radius: 16px;
      border: none;
      font-weight: 600;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn-submit {
      background: #0d6efd;
      color: white;
    }

    .btn-submit:hover {
      background: #0b5ed7;
      transform: translateY(-2px);
    }

    .btn-cancel {
      background: #e9ecef;
      color: #333;
    }

    .btn-cancel:hover {
      background: #dfe3e7;
    }

    /* =========================
       FLOATING BUTTON
    ========================== */
    .floating-back {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #0d6efd;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 24px;
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.35);
      z-index: 999;
      transition: 0.3s;
    }

    .floating-back:hover {
      transform: scale(1.08);
      background: #0b5ed7;
    }

    /* =========================
       FOOTER
    ========================== */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 30px;
      padding: 15px;
    }

    /* =========================
       MOBILE
    ========================== */
    @media (max-width: 576px) {

      .mobile-header {
        padding: 15px;
        border-radius: 0 0 20px 20px;
      }

      .card-mobile {
        padding: 22px;
        border-radius: 22px;
      }

      .section-title {
        font-size: 22px;
      }

      .btn-area {
        flex-direction: column;
      }

      .floating-back {
        width: 55px;
        height: 55px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="phone-wrapper">

    <!-- HEADER -->
    <div class="mobile-header">

      <div class="header-content">

        <button class="btn-back"
          onclick="window.location.href='index.html'">
          <i class="bi bi-arrow-left"></i>
        </button>

        <div class="title-area">
          <h5>Registrasi MCU</h5>
          <small>Form Input Peserta Baru</small>
        </div>

      </div>

    </div>

    <!-- CONTENT -->
    <div class="content-area">

      <div class="card-mobile">

        <div class="section-title">
          Data Peserta Baru
        </div>

        <div class="section-subtitle">
          Silahkan isi data pribadi dengan lengkap
        </div>

        <form action="qrcode.html" method="get">

          <div class="form-grid">

            <!-- Nama Depan -->
            <div class="form-item">
              <label class="form-label">Nama Depan</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person"></i>
                </span>

                <input type="text"
                  class="form-control"
                  placeholder="Masukkan nama depan">
              </div>
            </div>

            <!-- Nama Belakang -->
            <div class="form-item">
              <label class="form-label">Nama Belakang</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person"></i>
                </span>

                <input type="text"
                  class="form-control"
                  placeholder="Masukkan nama belakang">
              </div>
            </div>

            <!-- Jenis Kelamin -->
            <div class="form-item">
              <label class="form-label">Jenis Kelamin</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-gender-ambiguous"></i>
                </span>

                <select class="form-select">
                  <option selected disabled>
                    Pilih jenis kelamin
                  </option>

                  <option>Laki-laki</option>
                  <option>Perempuan</option>
                </select>
              </div>
            </div>

            <!-- NIK -->
            <div class="form-item">
              <label class="form-label">NIK KTP</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-credit-card"></i>
                </span>

                <input type="text"
                  class="form-control"
                  placeholder="Masukkan NIK">
              </div>
            </div>

            <!-- Tanggal Lahir -->
            <div class="form-item">
              <label class="form-label">Tanggal Lahir</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-calendar"></i>
                </span>

                <input type="date"
                  class="form-control">
              </div>
            </div>

            <!-- Email -->
            <div class="form-item">
              <label class="form-label">Email</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-envelope"></i>
                </span>

                <input type="email"
                  class="form-control"
                  placeholder="Masukkan email">
              </div>
            </div>

            <!-- Departemen -->
            <div class="form-item">
              <label class="form-label">Departemen</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-diagram-3"></i>
                </span>

                <input type="text"
                  class="form-control"
                  placeholder="Masukkan departemen">
              </div>
            </div>

            <!-- Telephone -->
            <div class="form-item">
              <label class="form-label">No Telephone</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-phone"></i>
                </span>

                <input type="text"
                  class="form-control"
                  placeholder="Masukkan nomor telephone">
              </div>
            </div>

            <!-- Alamat -->
            <div class="form-item full">
              <label class="form-label">Alamat</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-card-text"></i>
                </span>

                <textarea class="form-control"
                  placeholder="Masukkan alamat lengkap"></textarea>
              </div>
            </div>

          </div>

          <!-- BUTTON -->
          <div class="btn-area">

            <button type="submit"
              class="btn-submit">
              <i class="bi bi-check-circle"></i>
              Submit
            </button>

            <button type="reset"
              class="btn-cancel">
              <i class="bi bi-x-circle"></i>
              Cancel
            </button>

          </div>

        </form>

      </div>

      <!-- FOOTER -->
      <div class="footer">
        © 2026 Klinik dr Sander B - PT Daya Adicipta Medika
      </div>

    </div>

  </div>

  <!-- FLOATING BUTTON -->
  <a href="index.html" class="floating-back">
    <i class="bi bi-house-door-fill"></i>
  </a>

</body>

</html>
