<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Registrasi MCU</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f7fb;
      font-family: 'Segoe UI', sans-serif;
      color: #1d1d1d;
      padding-bottom: 100px;
    }

    /* ===== MOBILE HEADER ===== */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: #0d6efd;
      color: white;
      padding: 15px;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn-back {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 20px;
    }

    .title-area h5 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .title-area small {
      opacity: 0.9;
      font-size: 12px;
    }

    /* ===== CONTENT ===== */
    .content-area {
      padding: 18px;
    }

    .card-mobile {
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .section-subtitle {
      color: #6c757d;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ===== FORM ===== */
    .form-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #555;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group-text {
      background: #f7f9fc;
      border-radius: 14px 0 0 14px;
      border: 1px solid #dee2e6;
      color: #0d6efd;
      min-width: 50px;
      justify-content: center;
    }

    .form-control,
    .form-select,
    textarea {
      border-radius: 0 14px 14px 0 !important;
      min-height: 50px;
      border: 1px solid #dee2e6;
      font-size: 14px;
    }

    textarea.form-control {
      min-height: 100px;
      resize: none;
    }

    .form-control:focus,
    .form-select:focus {
      box-shadow: none;
      border-color: #0d6efd;
    }

    /* ===== BUTTON ===== */
    .btn-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 25px;
    }

    .btn-submit {
      background: #0d6efd;
      border: none;
      height: 50px;
      border-radius: 14px;
      color: white;
      font-weight: 600;
      font-size: 15px;
    }

    .btn-cancel {
      background: #e9ecef;
      border: none;
      height: 50px;
      border-radius: 14px;
      color: #333;
      font-weight: 600;
      font-size: 15px;
    }

    /* ===== FLOATING BACK BUTTON ===== */
    .floating-back {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #0d6efd;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 24px;
      box-shadow: 0 6px 15px rgba(13, 110, 253, 0.4);
      z-index: 999;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #888;
      margin-top: 25px;
      padding: 0 15px;
    }

    /* ===== MOBILE APP EFFECT ===== */
    .phone-wrapper {
      max-width: 480px;
      margin: auto;
      min-height: 100vh;
      background: #f4f7fb;
    }
  </style>
</head>

<body>

  <div class="phone-wrapper">

    <!-- HEADER -->
    <div class="mobile-header">
      <div class="header-content">

        <button class="btn-back"
          onclick="window.location.href='index.html'">
          <i class="bi bi-arrow-left"></i>
        </button>

        <div class="title-area">
          <h5>Registrasi MCU</h5>
          <small>Form Identitas Peserta</small>
        </div>

      </div>
    </div>

    <!-- CONTENT -->
    <div class="content-area">

      <div class="card-mobile">

        <div class="section-title">
          Data Peserta
        </div>

        <div class="section-subtitle">
          Silahkan isi data pribadi dengan lengkap
        </div>

        <form>

          <!-- Nama Depan -->
          <label class="form-label">Nama Depan</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>
            <input type="text"
              class="form-control"
              placeholder="Masukkan nama depan">
          </div>

          <!-- Nama Belakang -->
          <label class="form-label">Nama Belakang</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>
            <input type="text"
              class="form-control"
              placeholder="Masukkan nama belakang">
          </div>

          <!-- Jenis Kelamin -->
          <label class="form-label">Jenis Kelamin</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-gender-ambiguous"></i>
            </span>

            <select class="form-select">
              <option selected disabled>Pilih jenis kelamin</option>
              <option>Laki-laki</option>
              <option>Perempuan</option>
            </select>
          </div>

          <!-- NIK -->
          <label class="form-label">NIK KTP</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-credit-card"></i>
            </span>

            <input type="text"
              class="form-control"
              placeholder="Masukkan NIK">
          </div>

          <!-- Tanggal Lahir -->
          <label class="form-label">Tanggal Lahir</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-calendar"></i>
            </span>

            <input type="date"
              class="form-control">
          </div>

          <!-- Email -->
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-envelope"></i>
            </span>

            <input type="email"
              class="form-control"
              placeholder="Masukkan email">
          </div>

          <!-- Departemen -->
          <label class="form-label">Departemen</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-diagram-3"></i>
            </span>

            <input type="text"
              class="form-control"
              placeholder="Masukkan departemen">
          </div>

          <!-- Telephone -->
          <label class="form-label">No Telephone</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-phone"></i>
            </span>

            <input type="text"
              class="form-control"
              placeholder="Masukkan nomor telephone">
          </div>

          <!-- Alamat -->
          <label class="form-label">Alamat</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-card-text"></i>
            </span>

            <textarea class="form-control"
              placeholder="Masukkan alamat lengkap"></textarea>
          </div>

          <!-- BUTTON -->
          <div class="btn-area">

            <button type="submit"
              class="btn-submit">
              <i class="bi bi-check-circle"></i>
              Submit
            </button>

            <button type="reset"
              class="btn-cancel">
              <i class="bi bi-x-circle"></i>
              Cancel
            </button>

          </div>

        </form>

      </div>

      <!-- FOOTER -->
      <div class="footer">
        © 2026 Klinik dr Sander B - PT Daya Adicipta Medika
      </div>

    </div>

  </div>

  <!-- FLOATING STICKY BUTTON -->
  <a href="index.html" class="floating-back">
    <i class="bi bi-house-door-fill"></i>
  </a>

</body>

</html>
